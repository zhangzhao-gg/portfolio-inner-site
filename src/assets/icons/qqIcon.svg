<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="none"/>

  <!-- Feet -->
  <rect x="6" y="27" width="8" height="2" fill="#000000"/>
  <rect x="18" y="27" width="8" height="2" fill="#000000"/>
  <rect x="5" y="28" width="10" height="2" fill="#000000"/>
  <rect x="17" y="28" width="10" height="2" fill="#000000"/>
  <rect x="7" y="26" width="6" height="2" fill="#f2a31a"/>
  <rect x="19" y="26" width="6" height="2" fill="#f2a31a"/>
  <rect x="5" y="28" width="9" height="1" fill="#f2a31a"/>
  <rect x="18" y="28" width="9" height="1" fill="#f2a31a"/>

  <!-- Arms -->
  <rect x="3" y="14" width="4" height="9" fill="#000000"/>
  <rect x="25" y="14" width="4" height="9" fill="#000000"/>
  <rect x="2" y="18" width="3" height="5" fill="#000000"/>
  <rect x="27" y="18" width="3" height="5" fill="#000000"/>

  <!-- Body outline -->
  <rect x="9" y="12" width="14" height="2" fill="#000000"/>
  <rect x="7" y="14" width="18" height="4" fill="#000000"/>
  <rect x="6" y="18" width="20" height="7" fill="#000000"/>
  <rect x="8" y="25" width="16" height="2" fill="#000000"/>

  <!-- White belly -->
  <rect x="11" y="15" width="10" height="3" fill="#ffffff"/>
  <rect x="9" y="18" width="14" height="6" fill="#ffffff"/>
  <rect x="11" y="24" width="10" height="2" fill="#ffffff"/>

  <!-- Head outline -->
  <rect x="10" y="2" width="12" height="2" fill="#000000"/>
  <rect x="7" y="4" width="18" height="3" fill="#000000"/>
  <rect x="6" y="7" width="20" height="6" fill="#000000"/>
  <rect x="7" y="13" width="18" height="2" fill="#000000"/>

  <!-- Eyes -->
  <rect x="10" y="6" width="5" height="5" fill="#ffffff"/>
  <rect x="18" y="6" width="5" height="5" fill="#ffffff"/>
  <rect x="12" y="8" width="2" height="2" fill="#000000"/>
  <rect x="20" y="8" width="2" height="2" fill="#000000"/>

  <!-- Beak -->
  <rect x="12" y="12" width="8" height="1" fill="#000000"/>
  <rect x="10" y="13" width="12" height="2" fill="#f2a31a"/>
  <rect x="12" y="15" width="8" height="1" fill="#f2a31a"/>

  <!-- Red scarf -->
  <rect x="6" y="15" width="20" height="2" fill="#000000"/>
  <rect x="5" y="16" width="22" height="3" fill="#bd1018"/>
  <rect x="8" y="19" width="16" height="2" fill="#d91d25"/>
  <rect x="8" y="18" width="4" height="7" fill="#000000"/>
  <rect x="9" y="18" width="4" height="6" fill="#d91d25"/>
  <rect x="10" y="24" width="3" height="2" fill="#bd1018"/>
</svg>
